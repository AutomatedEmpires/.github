name: Reusable Release

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use
        required: false
        type: string
        default: "24.16.0"
      pnpm-version:
        description: pnpm version to use
        required: false
        type: string
        default: "10.12.4"
      version-script:
        description: Command Changesets runs to bump versions and update changelogs
        required: false
        type: string
        default: "pnpm exec changeset version"
      publish-script:
        description: Command Changesets runs to publish and tag a release
        required: false
        type: string
        default: "pnpm exec changeset publish"
    secrets:
      NPM_TOKEN:
        description: Optional npm automation token for publishing public packages
        required: false

concurrency:
  group: release-$ github.ref 
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: $ inputs.pnpm-version 
      - uses: actions/setup-node@v4
        with:
          node-version: $ inputs.node-version 
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Create release pull request or publish
        uses: changesets/action@v1
        with:
          version: $ inputs.version-script 
          publish: $ inputs.publish-script 
          createGithubReleases: true
        env:
          GITHUB_TOKEN: $ secrets.GITHUB_TOKEN 
          NPM_TOKEN: $ secrets.NPM_TOKEN 
          NODE_AUTH_TOKEN: $ secrets.NPM_TOKEN 
          NPM_CONFIG_PROVENANCE: "true"
